<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Corner Blocks</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <header class="game-header">
      <div>
        <p class="eyebrow">PC board game</p>
        <h1>Corner Blocks</h1>
        <p class="lead">角だけでつなげて陣地を広げる、1人用のブロック配置ゲーム。</p>
      </div>
      <div class="scoreboard" aria-label="スコア">
        <div class="score-card human-score">
          <span>You</span>
          <strong id="human-score">0</strong>
        </div>
        <div class="score-card cpu-score">
          <span>CPU</span>
          <strong id="cpu-score">0</strong>
        </div>
      </div>
    </header>

    <section class="game-layout" aria-label="Corner Blocks game">
      <section class="board-panel">
        <div class="board-toolbar">
          <div>
            <p class="eyebrow">Board</p>
            <h2 id="turn-label">あなたの番</h2>
          </div>
          <div class="turn-chip" id="turn-chip">Place a piece</div>
        </div>
        <div class="board" id="board" aria-label="14 x 14 の盤面"></div>
      </section>

      <aside class="side-panel">
        <section class="panel-section">
          <div class="section-title">
            <p class="eyebrow">Piece</p>
            <h2 id="selected-piece-name">選択中</h2>
          </div>
          <div class="piece-preview" id="piece-preview" aria-label="選択中のピース"></div>
          <div class="tool-row" aria-label="操作">
            <button type="button" id="rotate-piece">回転</button>
            <button type="button" id="flip-piece">反転</button>
            <button type="button" id="pass-turn">パス</button>
          </div>
          <button type="button" class="primary-action" id="new-game">新しいゲーム</button>
        </section>

        <section class="panel-section">
          <div class="section-title">
            <p class="eyebrow">Rules</p>
            <h2>置き方</h2>
          </div>
          <ul class="rules-list">
            <li>最初のピースは自分のスタート角を埋める。</li>
            <li>2手目以降は自分の色と角で接する。</li>
            <li>自分の色とは辺で接してはいけない。</li>
            <li>置けなくなったらパス。多く埋めた方が勝ち。</li>
          </ul>
        </section>

        <section class="panel-section pieces-section">
          <div class="section-title">
            <p class="eyebrow">Tray</p>
            <h2>手駒</h2>
          </div>
          <div class="piece-tray" id="piece-tray"></div>
        </section>
      </aside>
    </section>

    <section class="message-bar" id="message-bar" aria-live="polite">ピースを選んで、盤面に置いてください。</section>
  </main>

  <script src="script.js"></script>
</body>
</html>
